<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}HookPilot{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#0f172a',
            card: '#1e293b',
            border: '#334155',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <style>
    body { background-color: #0f172a; color: #f1f5f9; }
    .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
    pre[class*="language-"] { background: #0d1117 !important; border-radius: 0.5rem; font-size: 0.8rem; margin: 0; }
    .method-GET     { background: #3b82f6; }
    .method-POST    { background: #22c55e; }
    .method-PUT     { background: #f59e0b; }
    .method-PATCH   { background: #a855f7; }
    .method-DELETE  { background: #ef4444; }
    .method-HEAD    { background: #64748b; }
    .method-OPTIONS { background: #14b8a6; }
    .tab-btn.active { border-bottom: 2px solid #6366f1; color: #e2e8f0; }
    .live-dot { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .req-row.selected { background: #1e3a5f !important; border-left: 3px solid #6366f1; }
    .req-row:hover { background: #1e293b; cursor: pointer; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .copy-btn { transition: all 0.15s; }
    .copy-btn:hover { color: #6366f1; }
    input, textarea, select {
      background: #0f172a !important;
      border: 1px solid #334155 !important;
      color: #f1f5f9 !important;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
    }
    input:focus, textarea:focus { outline: 2px solid #6366f1; border-color: transparent !important; }
    .modal-overlay { backdrop-filter: blur(2px); }
  </style>
</head>
<body class="h-full dark">

<nav class="border-b border-slate-700 bg-slate-900 px-6 py-3 flex items-center justify-between sticky top-0 z-40">
  <a href="/" class="flex items-center gap-2 font-bold text-lg text-white hover:text-indigo-400 transition-colors">
    <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
    HookPilot
  </a>
  <div class="flex items-center gap-3">
    {% block nav_actions %}{% endblock %}
    <a href="/api/docs" target="_blank"
       class="text-slate-400 hover:text-white text-sm transition-colors">API docs</a>
    <a href="https://github.com/colapsis/hookpilot" target="_blank"
       class="text-slate-400 hover:text-white transition-colors">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57
                 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41
                 -1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815
                 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925
                 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23
                 .96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65
                 .24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925
                 .435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57
                 A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
  </div>
</nav>

<main class="{% block main_class %}{% endblock %}">
  {% block content %}{% endblock %}
</main>

<script>
// Relative timestamps
function timeAgo(isoStr) {
  const diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
  if (diff < 5)   return 'just now';
  if (diff < 60)  return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function refreshTimestamps() {
  document.querySelectorAll('[data-ts]').forEach(el => {
    el.textContent = timeAgo(el.dataset.ts);
  });
}
refreshTimestamps();
setInterval(refreshTimestamps, 15000);

// Copy to clipboard
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
    setTimeout(() => btn.innerHTML = orig, 1500);
  });
}

// Tab switching
function switchTab(tabGroup, tabName) {
  document.querySelectorAll(`[data-tab-group="${tabGroup}"]`).forEach(el => {
    el.classList.add('hidden');
  });
  document.querySelectorAll(`[data-tab-btn="${tabGroup}"]`).forEach(el => {
    el.classList.remove('active');
  });
  document.getElementById(`tab-${tabGroup}-${tabName}`).classList.remove('hidden');
  document.querySelector(`[data-tab-btn="${tabGroup}"][data-tab-name="${tabName}"]`).classList.add('active');
}
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
