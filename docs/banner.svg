<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Main background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#1e0a3c"/>
    </linearGradient>

    <!-- Logo mark gradient -->
    <linearGradient id="mark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#f0f4ff"/>
      <stop offset="45%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Left accent gradient (glow behind logo) -->
    <radialGradient id="logoBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(109,40,217,0.3)"/>
      <stop offset="100%" stop-color="rgba(109,40,217,0)"/>
    </radialGradient>

    <!-- Right side grid lines fade -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(109,40,217,0)"/>
      <stop offset="40%"  stop-color="rgba(109,40,217,0.12)"/>
      <stop offset="100%" stop-color="rgba(109,40,217,0.06)"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Subtle top border -->
  <rect width="800" height="2" fill="rgba(109,40,217,0.6)"/>

  <!-- Grid lines (right half) -->
  <rect x="300" y="0" width="500" height="200" fill="url(#gridFade)"/>
  <!-- Horizontal grid lines -->
  <line x1="320" y1="40"  x2="800" y2="40"  stroke="rgba(109,40,217,0.08)" stroke-width="1"/>
  <line x1="320" y1="80"  x2="800" y2="80"  stroke="rgba(109,40,217,0.08)" stroke-width="1"/>
  <line x1="320" y1="120" x2="800" y2="120" stroke="rgba(109,40,217,0.08)" stroke-width="1"/>
  <line x1="320" y1="160" x2="800" y2="160" stroke="rgba(109,40,217,0.08)" stroke-width="1"/>
  <!-- Vertical grid lines -->
  <line x1="380" y1="0" x2="380" y2="200" stroke="rgba(109,40,217,0.06)" stroke-width="1"/>
  <line x1="460" y1="0" x2="460" y2="200" stroke="rgba(109,40,217,0.06)" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="200" stroke="rgba(109,40,217,0.06)" stroke-width="1"/>
  <line x1="620" y1="0" x2="620" y2="200" stroke="rgba(109,40,217,0.06)" stroke-width="1"/>
  <line x1="700" y1="0" x2="700" y2="200" stroke="rgba(109,40,217,0.06)" stroke-width="1"/>
  <line x1="780" y1="0" x2="780" y2="200" stroke="rgba(109,40,217,0.06)" stroke-width="1"/>

  <!-- Decorative dots (right side) -->
  <circle cx="420" cy="60"  r="2" fill="rgba(167,139,250,0.25)"/>
  <circle cx="500" cy="140" r="2" fill="rgba(167,139,250,0.25)"/>
  <circle cx="660" cy="80"  r="2" fill="rgba(167,139,250,0.20)"/>
  <circle cx="740" cy="40"  r="1.5" fill="rgba(224,231,255,0.15)"/>
  <circle cx="580" cy="160" r="1.5" fill="rgba(167,139,250,0.20)"/>
  <circle cx="760" cy="160" r="3" fill="rgba(109,40,217,0.3)"/>
  <circle cx="440" cy="100" r="1" fill="rgba(224,231,255,0.12)"/>

  <!-- Logo glow halo -->
  <ellipse cx="110" cy="100" rx="70" ry="65" fill="url(#logoBg)"/>

  <!-- Logo icon mark (scaled 75x75, centered at x=73, y=63) -->
  <g transform="translate(73, 63) scale(0.75)">
    <!-- Border -->
    <rect width="100" height="100" rx="22" fill="none"
          stroke="rgba(167,139,250,0.35)" stroke-width="2"/>
    <!-- Glow shadow -->
    <path opacity="0.4" fill="#a78bfa" filter="url(#glow)"
      d="M61 11 L34 53 L49 53 L43 70
         C40 81 43 93 53 95 C64 97 74 87 71 75
         L67 69 C67 79 61 87 55 86
         C49 84 49 73 52 65
         L58 53 L73 53 Z"/>
    <!-- Hook-bolt -->
    <path fill="url(#mark)"
      d="M61 11 L34 53 L49 53 L43 70
         C40 81 43 93 53 95 C64 97 74 87 71 75
         L67 69 C67 79 61 87 55 86
         C49 84 49 73 52 65
         L58 53 L73 53 Z"/>
    <!-- Sparkles -->
    <circle cx="21" cy="19" r="1.8" fill="rgba(224,231,255,0.5)"/>
    <circle cx="81" cy="76" r="2"   fill="rgba(167,139,250,0.4)"/>
    <circle cx="77" cy="21" r="1.2" fill="rgba(224,231,255,0.35)"/>
  </g>

  <!-- Wordmark -->
  <text x="190" y="110"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="52" font-weight="700" letter-spacing="-1"
        fill="white" filter="url(#textGlow)">HookPilot</text>

  <!-- Tagline -->
  <text x="192" y="140"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" font-weight="400" letter-spacing="0.3"
        fill="rgba(167,139,250,0.85)">Self-hosted webhook inspector · debugger · replayer</text>

  <!-- Feature pills (bottom row) -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
     font-size="11.5" font-weight="500">
    <!-- Live feed -->
    <rect x="192" y="155" width="76" height="22" rx="11" fill="rgba(109,40,217,0.35)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
    <text x="228" y="170" text-anchor="middle" fill="rgba(196,181,253,0.95)">⚡ Live feed</text>

    <!-- Replay -->
    <rect x="276" y="155" width="62" height="22" rx="11" fill="rgba(109,40,217,0.35)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
    <text x="307" y="170" text-anchor="middle" fill="rgba(196,181,253,0.95)">↺ Replay</text>

    <!-- AI powered -->
    <rect x="346" y="155" width="88" height="22" rx="11" fill="rgba(109,40,217,0.45)" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
    <text x="390" y="170" text-anchor="middle" fill="rgba(221,214,254,1)">✨ AI powered</text>

    <!-- Self-hosted -->
    <rect x="442" y="155" width="82" height="22" rx="11" fill="rgba(109,40,217,0.35)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
    <text x="483" y="170" text-anchor="middle" fill="rgba(196,181,253,0.95)">🐳 Self-hosted</text>
  </g>
</svg>
